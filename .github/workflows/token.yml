on:
  workflow_dispatch:

jobs:
  token-demo:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Prove GITHUB_TOKEN exists (won't reveal it)
        shell: bash
        run: |
          if [ -z "${GITHUB_TOKEN}" ]; then
            echo "GITHUB_TOKEN is NOT set"
            exit 1
          fi
          echo "GITHUB_TOKEN is set"
          echo "Length: ${#GITHUB_TOKEN}"

      - name: Attempt to print token (will be masked)
        shell: bash
        run: |
          echo "GITHUB_TOKEN=${GITHUB_TOKEN}"

      - name: Use token to call GitHub API (safe output)
        shell: bash
        run: |
          curl -sS \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/user | jq '{login, id, type}'
        env:
          GITHUB_TOKEN: ${{ github.token }}
