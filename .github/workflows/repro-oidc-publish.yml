name: Repro npm OIDC publish (setup-node v4, node 20)

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    # Required for npm OIDC / provenance (Trusted Publisher)
    permissions:
       contents: write # to be able to publish a GitHub release
       id-token: write # to be able to publish to GitHub Packages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # "Magic" auth wiring happens when registry-url is set
      - name: Setup Node (v4) + registry-url
        uses: actions/setup-node@v6
        with:
          node-version: "24.12.0"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: ./package-lock.json
                  
      - name: Install npm 11.6.2
        run: npm install -g npm@11.6.2

        
      - name: Verify environment
        run: |
          echo "node: $(node -v)"
          echo "npm: $(npm -v)"
          echo "yarn: $(yarn -v)"
 
      - name: Bump version (required for publish)
        shell: bash
        run: npm version patch --no-git-tag-version

      - name: Publish to npm (OIDC Trusted Publisher)
        run: |
          npm publish --access=public
