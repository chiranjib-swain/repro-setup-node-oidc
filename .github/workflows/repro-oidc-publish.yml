name: Repro npm OIDC publish (cache enabled, npm pinned)

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        npm:
          - "11.6.2"
          - "11.11.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (setup-node v4, cache=npm)
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Pin npm to ${{ matrix.npm }}
        run: |
          npm i -g npm@${{ matrix.npm }}
          npm --version

      - name: Enable provenance (OIDC)
        shell: bash
        run: echo "NPM_CONFIG_PROVENANCE=true" >> "$GITHUB_ENV"

      - name: Diagnostics
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Variant: npm=${{ matrix.npm }} (cache=npm) ==="
          node --version
          npm --version
          echo "NODE_AUTH_TOKEN set? $([ -n "${NODE_AUTH_TOKEN:-}" ] && echo yes || echo no)"
          uc="$(npm config get userconfig)"
          echo "userconfig=$uc"
          if [ -f "$uc" ]; then
            echo "=== user .npmrc (redacted) ==="
            sed -e 's/_authToken=.*/_authToken=***redacted***/' "$uc"
          fi

      # Publish real only for one variant to avoid version conflicts
      - name: Bump version (only for REAL publish)
        if: ${{ matrix.npm == '11.11.0' }}
        run: npm version patch --no-git-tag-version

      - name: Publish to npm (REAL) - npm 11.11.0
        if: ${{ matrix.npm == '11.11.0' }}
        run: npm publish --access=public

      - name: Publish to npm (DRY RUN) - npm 11.6.2
        if: ${{ matrix.npm != '11.11.0' }}
        run: npm publish --access=public --dry-run
