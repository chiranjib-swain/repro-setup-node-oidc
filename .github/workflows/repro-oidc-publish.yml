name: Repro npm OIDC publish (setup-node v4, node 20)

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (v6) + registry-url
        uses: actions/setup-node@v6
        with:
          node-version: "24.12.0"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: ./package-lock.json

      - name: Verify environment
        run: |
          echo "node: $(node -v)"
          echo "npm: $(npm -v)"
          echo "yarn: $(yarn -v)"

      - name: Get current npm version
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          CURRENT_VERSION=$(npm view $PKG_NAME version || echo "0.0.0")
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_ENV

      - name: Bump version from registry
        run: |
          NEW_VERSION=$(node -e "
            const v = process.env.CURRENT_VERSION.split('.');
            v[2] = Number(v[2]) + 1;
            console.log(v.join('.'));
          ")
          echo "Publishing version: $NEW_VERSION"
          npm pkg set version=$NEW_VERSION

      - name: Publish to npm (OIDC Trusted Publisher)
        run: npm publish --access=public